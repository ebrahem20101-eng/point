<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام مدرسة الوليد بن عمارة - النسخة السحابية</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); color: white; min-height: 100vh; }
    .tab-active { background: #fbbf24; color: #0f172a; font-weight: 900; box-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
    .gold-card { border: 2px solid #fbbf24; background: rgba(30, 41, 59, 0.9); box-shadow: 0 0 30px rgba(251, 191, 36, 0.2); }
    .animate-float { animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  </style>
</head>
<body class="p-4 md:p-8">
  <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 bg-slate-800/40 p-6 rounded-[2rem] border border-slate-700">
    <div class="text-center md:text-right">
      <h1 class="text-3xl font-black text-amber-500 italic">🏆 لوحة الصدارة السحابية</h1>
      <p class="text-slate-400 font-bold tracking-widest">مدرسة الوليد بن عمارة الابتدائية</p>
    </div>
    <nav class="flex bg-slate-900 p-1.5 rounded-2xl border border-slate-700">
      <button onclick="switchTab('display')" id="btn-display" class="tab-active px-8 py-3 rounded-xl transition-all">الشاشة</button>
      <button onclick="switchTab('control')" id="btn-control" class="px-8 py-3 rounded-xl transition-all">المعلمون</button>
      <button onclick="switchTab('admin')" id="btn-admin" class="px-8 py-3 rounded-xl transition-all">الإدارة</button>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto">
    <section id="sec-display" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></section>

    <!-- Cloud Setup Message -->
    <section id="sec-admin" class="hidden space-y-8">
      <div class="bg-amber-500/10 border border-amber-500/50 p-6 rounded-2xl text-amber-200">
        <h4 class="font-black mb-2">☁️ إعداد الربط السحابي (للمشاركة بين الأجهزة)</h4>
        <p class="text-sm mb-4">ضع رابط Firebase Realtime Database الخاص بك هنا ليعمل النظام على كل الجوالات:</p>
        <input id="fb-url" type="text" placeholder="https://your-project.firebaseio.com/" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 text-left dir-ltr mb-4">
        <button onclick="saveCloudConfig()" class="bg-amber-500 text-slate-900 px-6 py-2 rounded-xl font-bold">حفظ وربط</button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="bg-slate-800 p-8 rounded-[2rem] border border-slate-700">
          <h4 class="text-xl font-black mb-4 text-amber-500">إدارة المعلمين</h4>
          <input type="file" id="up-t" class="hidden" onchange="handleT()">
          <button onclick="document.getElementById('up-t').click()" class="w-full bg-slate-900 p-4 rounded-xl border border-dashed border-slate-600 mb-4">رفع ملف المعلمين</button>
          <button onclick="exportT()" id="btn-ex" class="hidden w-full bg-blue-500/20 text-blue-400 p-3 rounded-xl border border-blue-500/30">تحميل الأكواد</button>
        </div>
        <div class="bg-slate-800 p-8 rounded-[2rem] border border-slate-700">
          <h4 class="text-xl font-black mb-4 text-amber-500">إدارة الطلاب</h4>
          <button onclick="document.getElementById('up-s').click()" class="w-full bg-slate-900 p-4 rounded-xl border border-dashed border-slate-600">رفع ملف الطلاب</button>
          <input type="file" id="up-s" class="hidden" onchange="handleS()">
        </div>
      </div>
    </section>

    <!-- Login & Control -->
    <section id="sec-login" class="hidden max-w-md mx-auto text-center bg-slate-800 p-10 rounded-[2.5rem] border border-slate-700">
      <h2 class="text-2xl font-black mb-6">دخول المعلمين</h2>
      <input id="auth-code" type="text" placeholder="••••" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-700 text-center text-3xl mb-6 text-amber-500 font-black">
      <button onclick="authenticate()" class="w-full bg-amber-500 text-slate-900 py-5 rounded-2xl font-black text-xl">دخول</button>
    </section>

    <section id="sec-control" class="hidden max-w-2xl mx-auto bg-slate-800 p-10 rounded-[3rem] border border-slate-700">
      <h3 id="welcome-txt" class="text-center text-emerald-400 font-black mb-8 text-2xl"></h3>
      <div class="space-y-6">
        <select id="class-filter" onchange="updateList()" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-700 text-white font-bold"></select>
        <select id="student-select" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-700 text-white font-bold"></select>
        <input id="pts" type="text" value="1" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-700 text-center text-4xl font-black text-amber-500">
        <button onclick="addPts()" class="w-full bg-amber-500 text-slate-900 py-6 rounded-2xl font-black text-2xl">إضافة النقاط الآن ✓</button>
      </div>
    </section>
  </main>

  <script>
    function fixNums(str) { return String(str).replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d)); }
    
    let db = {
      teachers: JSON.parse(localStorage.getItem('alwalid_t') || '[{"name":"إبراهيم البركاتي","code":"7777"}]'),
      students: JSON.parse(localStorage.getItem('alwalid_s') || '[]'),
      cloudUrl: localStorage.getItem('fb_url') || '',
      isAuth: false, target: 'control'
    };

    async function syncPush() {
      if(!db.cloudUrl) return;
      try {
        await fetch(db.cloudUrl + '/data.json', { method: 'PUT', body: JSON.stringify({s: db.students, t: db.teachers}) });
      } catch(e) { console.error("Cloud Error", e); }
    }

    async function syncPull() {
      if(!db.cloudUrl) return;
      try {
        const res = await fetch(db.cloudUrl + '/data.json');
        const data = await res.json();
        if(data) {
          db.students = data.s || [];
          db.teachers = data.t || [];
          render();
        }
      } catch(e) { console.error("Pull Error", e); }
    }

    function saveCloudConfig() {
      const url = document.getElementById('fb-url').value.trim().replace(/\/$/, "");
      db.cloudUrl = url;
      localStorage.setItem('fb_url', url);
      syncPush();
      alert("تم الربط السحابي بنجاح!");
    }

    function switchTab(t) {
      if ((t==='control'||t==='admin') && !db.isAuth) { db.target = t; hide(); document.getElementById('sec-login').classList.remove('hidden'); }
      else { hide(); document.getElementById('sec-' + t).classList.remove('hidden'); if(t==='display') render(); if(t==='control') initC(); if(t==='admin') document.getElementById('fb-url').value = db.cloudUrl; }
    }
    function hide() { ['display','login','control','admin'].forEach(s=>document.getElementById('sec-'+s).classList.add('hidden')); }

    function authenticate() {
      const c = fixNums(document.getElementById('auth-code').value);
      const u = db.teachers.find(x=>fixNums(x.code)===c);
      if(u) { db.isAuth=true; document.getElementById('welcome-txt').innerText = "مرحباً: " + u.name; switchTab(db.target); }
      else alert('الكود خطأ');
    }

    function render() {
      const board = document.getElementById('sec-display');
      if(!db.students.length) { board.innerHTML="<div class='col-span-full text-center py-20 opacity-40 font-bold'>ارفع ملف الطلاب في الإدارة...</div>"; return; }
      const sorted = [...db.students].sort((a,b)=>b.points-a.points).slice(0,12);
      board.innerHTML = sorted.map((s,i)=>`
        <div class="p-10 rounded-[2.5rem] text-center ${i===0?'gold-card animate-float':'bg-slate-800/60 border border-slate-700'}">
          <div class="text-6xl mb-4">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'👤'}</div>
          <h3 class="text-2xl font-black text-white">${s.name}</h3>
          <p class="text-slate-500 font-bold mb-6">${s.class}</p>
          <div class="text-6xl font-black text-amber-500">${s.points}</div>
        </div>`).join('');
    }

    function initC() {
      const cls = [...new Set(db.students.map(s=>s.class))].sort();
      document.getElementById('class-filter').innerHTML = '<option value="all">جميع الفصول</option>' + cls.map(c=>`<option value="${c}">${c}</option>`).join('');
      updateList();
    }
    function updateList() {
      const f = document.getElementById('class-filter').value;
      const filtered = f==='all'?db.students:db.students.filter(s=>s.class===f);
      document.getElementById('student-select').innerHTML = filtered.map(s=>`<option value="${db.students.indexOf(s)}">${s.name} (${s.class})</option>`).join('');
    }

    async function addPts() {
      const i = document.getElementById('student-select').value;
      const p = parseInt(fixNums(document.getElementById('pts').value) || 0);
      db.students[i].points += p;
      localStorage.setItem('alwalid_s', JSON.stringify(db.students));
      await syncPush();
      alert('تم التحديث سحابياً!');
      render();
    }

    // Interval to pull updates every 5 seconds for the live screen
    setInterval(() => { if(document.getElementById('sec-display').classList.contains('hidden') === false) syncPull(); }, 5000);

    function handleT() {
      const r = new FileReader();
      r.onload = (e) => {
        const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result),{type:'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result),{type:'array'}).SheetNames[0]]);
        db.teachers = json.map(x=>({name:x.الاسم||x.name, code:Math.floor(1000+Math.random()*9000).toString()}));
        db.teachers.push({name:"إبراهيم البركاتي", code:"7777"});
        localStorage.setItem('alwalid_t', JSON.stringify(db.teachers));
        syncPush();
        alert('تم!'); document.getElementById('btn-ex').classList.remove('hidden');
      };
      r.readAsArrayBuffer(document.getElementById('up-t').files[0]);
    }
    function handleS() {
      const r = new FileReader();
      r.onload = (e) => {
        const json = XLSX.utils.sheet_to_json(XLSX.read(new Uint8Array(e.target.result),{type:'array'}).Sheets[XLSX.read(new Uint8Array(e.target.result),{type:'array'}).SheetNames[0]]);
        db.students = json.map(x=>({name:x.الاسم||x.name, class:String(x.الفصل||x.class), points:0}));
        localStorage.setItem('alwalid_s', JSON.stringify(db.students));
        syncPush();
        alert('تم!'); render();
      };
      r.readAsArrayBuffer(document.getElementById('up-s').files[0]);
    }
    window.onload = render;
  </script>
</body>
</html>
