<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام مدرسة الوليد بن عمارة - V12.2</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
    .tab-active { background: #fbbf24; color: #0f172a; font-weight: 900; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
    .card-dark { background: #1e293b; border: 1px solid #334155; border-radius: 24px; padding: 24px; }
    input, select { background: #0f172a !important; border: 1px solid #334155 !important; color: white !important; }
    .btn-danger { background: #ef4444; color: white; padding: 10px 20px; border-radius: 12px; font-weight: bold; }
  </style>
</head>
<body class="p-4">
  <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 bg-slate-800/50 p-6 rounded-[2rem] border border-slate-700">
    <div class="text-right">
      <h1 class="text-2xl font-black text-amber-500 italic">🏆 مدرسة الوليد بن عمارة</h1>
      <p class="text-slate-400 text-xs">نظام الإدارة السحابي المتصل - V12.2</p>
    </div>
    <nav class="flex bg-slate-900 p-1 rounded-2xl mt-4 md:mt-0 border border-slate-800">
      <button onclick="switchTab('display')" id="btn-display" class="tab-active px-6 py-2 rounded-xl">الشاشة</button>
      <button onclick="switchTab('control')" id="btn-control" class="px-6 py-2 rounded-xl text-slate-500">رصد النقاط</button>
      <button onclick="switchTab('admin')" id="btn-admin" class="px-6 py-2 rounded-xl text-slate-500">الإدارة</button>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto">
    <section id="sec-display" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></section>

    <section id="sec-admin" class="hidden space-y-8">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="card-dark border-amber-500/30 text-center">
          <h4 class="text-amber-500 font-black mb-2">☁️ حالة الاتصال السحابي</h4>
          <p id="conn-status" class="text-xs text-slate-400 mb-4 italic">بانتظار التأكد من البيانات...</p>
          <button onclick="syncPush()" class="bg-amber-500 text-black px-6 py-2 rounded-xl font-black text-sm w-full">إرسال البيانات للسحابة الآن</button>
        </div>
        <div class="card-dark border-red-500/30 text-center">
          <h4 class="text-red-500 font-black mb-2">⚠️ تصفير البيانات</h4>
          <p class="text-slate-400 text-[10px] mb-4 text-center">سيتم حذف المعلمين والطلاب (وقت الحاجة)</p>
          <button onclick="resetAllData()" class="btn-danger w-full text-sm">حذف شامل</button>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="card-dark">
          <h3 class="text-lg font-black text-amber-500 mb-4 border-b border-slate-700 pb-2 text-center">👨‍🏫 المعلمين</h3>
          <div class="flex gap-2 mb-4">
            <input id="new-t-name" type="text" placeholder="اسم المعلم" class="flex-1 p-2 rounded-lg text-sm">
            <button onclick="addTeacherManual()" class="bg-emerald-600 px-4 rounded-lg font-bold text-sm">إضافة</button>
          </div>
          <div class="space-y-2 mb-4">
            <input type="file" id="up-t" class="hidden" onchange="handleT()">
            <button onclick="document.getElementById('up-t').click()" class="w-full bg-slate-700 p-2 rounded-lg border border-dashed border-slate-500 text-xs">📁 رفع إكسل المعلمين</button>
            <button onclick="exportTeacherCodes()" class="w-full bg-blue-600 p-2 rounded-lg font-bold text-xs">📥 تحميل الأكواد (Excel)</button>
          </div>
          <div class="max-h-52 overflow-y-auto bg-slate-900 rounded-xl p-2"><table class="w-full text-right text-[10px]"><tbody id="list-t"></tbody></table></div>
        </div>

        <div class="card-dark">
          <h3 class="text-lg font-black text-amber-500 mb-4 border-b border-slate-700 pb-2 text-center">🎓 الطلاب</h3>
          <div class="flex gap-2 mb-4">
            <input id="new-s-name" type="text" placeholder="اسم الطالب" class="flex-1 p-2 rounded-lg text-sm">
            <input id="new-s-class" type="text" placeholder="الفصل" class="w-14 p-2 rounded-lg text-sm">
            <button onclick="addStudentManual()" class="bg-emerald-600 px-4 rounded-lg font-bold text-sm">إضافة</button>
          </div>
          <div class="space-y-2 mb-4">
            <input type="file" id="up-s" class="hidden" onchange="handleS()">
            <button onclick="document.getElementById('up-s').click()" class="w-full bg-slate-700 p-2 rounded-lg border border-dashed border-slate-500 text-xs">📁 رفع إكسل الطلاب</button>
          </div>
          <div class="max-h-52 overflow-y-auto bg-slate-900 rounded-xl p-2"><table class="w-full text-right text-[10px]"><tbody id="list-s"></tbody></table></div>
        </div>
      </div>
    </section>

    <section id="sec-login" class="hidden max-w-md mx-auto card-dark text-center">
      <h2 class="text-xl font-bold mb-6">دخول المعلمين</h2>
      <input id="auth-code" type="password" placeholder="أدخل كودك" class="w-full p-4 rounded-xl text-center text-4xl font-black mb-6">
      <button onclick="authenticate()" class="w-full bg-amber-500 text-black py-4 rounded-2xl font-black">دخول</button>
    </section>

    <section id="sec-control" class="hidden max-w-2xl mx-auto card-dark">
      <h3 id="welcome-txt" class="text-center text-emerald-400 font-black mb-6"></h3>
      <div class="space-y-4">
        <select id="class-filter" onchange="updateList()" class="w-full p-3 rounded-xl font-bold"></select>
        <select id="student-select" class="w-full p-3 rounded-xl font-bold"></select>
        <input id="pts" type="number" value="1" class="w-full p-4 rounded-xl text-center text-5xl font-black text-amber-500">
        <button onclick="addPts()" class="w-full bg-amber-500 text-black py-5 rounded-2xl font-black text-xl">رصد النقاط ✓</button>
      </div>
    </section>
  </main>

  <script>
    const FIREBASE_URL = "https://alwalid-school-default-rtdb.firebaseio.com";
    function fixNums(str) { return String(str).replace(/[٠-٩]/g, d => '٠١٢٣٤٥٦٧٨٩'.indexOf(d)); }
    
    let db = { 
      teachers: JSON.parse(localStorage.getItem('walid_t')) || [{"name":"إبراهيم البركاتي","code":"7777"}], 
      students: JSON.parse(localStorage.getItem('walid_s')) || [], 
      isAuth: false 
    };

    async function syncPush() {
      try {
        const res = await fetch(`${FIREBASE_URL}/school_data.json`, {
          method: 'PUT',
          body: JSON.stringify({ s: db.students, t: db.teachers })
        });
        if(res.ok) {
          document.getElementById('conn-status').innerText = "✅ متصل وتم التزامن";
          localStorage.setItem('walid_s', JSON.stringify(db.students));
          localStorage.setItem('walid_t', JSON.stringify(db.teachers));
        }
      } catch(e) { document.getElementById('conn-status').innerText = "❌ فشل الاتصال.. تحقق من الـ Rules"; }
    }

    async function syncPull() {
      try {
        const res = await fetch(`${FIREBASE_URL}/school_data.json`);
        const data = await res.json();
        if(data && data.s) {
          db.students = data.s; db.teachers = data.t;
          render(); renderAdminLists();
        }
      } catch(e){}
    }

    function switchTab(t) {
      document.querySelectorAll('nav button').forEach(b => b.className = 'px-6 py-2 rounded-xl text-slate-500');
      document.getElementById('btn-'+t).className = 'tab-active px-6 py-2 rounded-xl';
      if ((t==='control'||t==='admin') && !db.isAuth) { db.target = t; hide(); document.getElementById('sec-login').classList.remove('hidden'); }
      else { hide(); document.getElementById('sec-' + t).classList.remove('hidden'); if(t==='display') render(); if(t==='control') initC(); if(t==='admin') renderAdminLists(); }
    }
    function hide() { ['display','login','control','admin'].forEach(s=>document.getElementById('sec-'+s).classList.add('hidden')); }
    function authenticate() { const c = fixNums(document.getElementById('auth-code').value); const u = db.teachers.find(x=>fixNums(x.code)===c); if(u) { db.isAuth=true; document.getElementById('welcome-txt').innerText = "أهلاً بك: " + u.name; switchTab(db.target); } else alert('كود خطأ'); }

    function addTeacherManual() { const n = document.getElementById('new-t-name').value; if(n) { db.teachers.push({name:n, code:Math.floor(1000+Math.random()*9000).toString()}); syncPush(); renderAdminLists(); document.getElementById('new-t-name').value=''; } }
    function addStudentManual() { const n = document.getElementById('new-s-name').value; const c = document.getElementById('new-s-class').value; if(n && c) { db.students.push({name:n, class:c, points:0}); syncPush(); renderAdminLists(); document.getElementById('new-s-name').value=''; } }
    function deleteT(idx) { if(confirm('حذف؟')) { db.teachers.splice(idx,1); syncPush(); renderAdminLists(); } }
    function deleteS(idx) { if(confirm('حذف؟')) { db.students.splice(idx,1); syncPush(); renderAdminLists(); } }

    function resetAllData() { if(confirm('حذف الكل؟')) { db.students = []; db.teachers = [{"name":"إبراهيم البركاتي","code":"7777"}]; syncPush(); render(); renderAdminLists(); } }

    function handleT() {
      const f = document.getElementById('up-t').files[0]; const r = new FileReader();
      r.onload = (e) => {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        db.teachers = json.map(x => ({ name: x.الاسم || x.name, code: Math.floor(1000+Math.random()*9000).toString() }));
        db.teachers.push({"name":"إبراهيم البركاتي","code":"7777"});
        syncPush(); renderAdminLists();
      }; r.readAsArrayBuffer(f);
    }

    function handleS() {
      const f = document.getElementById('up-s').files[0]; const r = new FileReader();
      r.onload = (e) => {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        db.students = json.map(x => ({ name: x.الاسم || x.name, class: String(x.الفصل || x.class), points: 0 }));
        syncPush(); renderAdminLists(); render();
      }; r.readAsArrayBuffer(f);
    }

    function exportTeacherCodes() {
      const data = db.teachers.map(t => ({ "اسم المعلم": t.name, "الكود السري": t.code }));
      const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "الأكواد");
      XLSX.writeFile(wb, "أكواد_المعلمين.xlsx");
    }

    function renderAdminLists() {
      document.getElementById('list-t').innerHTML = db.teachers.map((t,i)=>`<tr class="border-b border-slate-800"><td class="p-1">${t.name}</td><td class="p-1 text-amber-500">${t.code}</td><td class="text-center"><button onclick="deleteT(${i})" class="text-red-500">✖</button></td></tr>`).join('');
      document.getElementById('list-s').innerHTML = db.students.map((s,i)=>`<tr class="border-b border-slate-800"><td class="p-1">${s.name}</td><td class="p-1">${s.class}</td><td class="text-center"><button onclick="deleteS(${i})" class="text-red-500">✖</button></td></tr>`).join('');
    }

    function render() {
      const board = document.getElementById('sec-display');
      const sorted = [...db.students].sort((a,b)=>b.points-a.points).slice(0,12);
      board.innerHTML = sorted.length ? sorted.map((s,i)=>`<div class="p-6 rounded-3xl text-center bg-slate-800 border border-slate-700"><div>${i===0?'🥇':i===1?'🥈':'👤'}</div><h3 class="font-black text-white text-sm">${s.name}</h3><p class="text-slate-500 text-[10px]">${s.class}</p><div class="text-3xl font-black text-amber-500">${s.points}</div></div>`).join('') : "<div class='col-span-full opacity-20 text-center'>بانتظار البيانات...</div>";
    }

    function initC() { 
        const cls = [...new Set(db.students.map(s=>s.class))].sort(); 
        document.getElementById('class-filter').innerHTML = '<option value="all">كل الفصول</option>' + cls.map(c=>`<option value="${c}">${c}</option>`).join(''); 
        updateList(); 
    }
    function updateList() { 
        const f = document.getElementById('class-filter').value; 
        const filtered = f==='all'?db.students:db.students.filter(s=>s.class===f); 
        document.getElementById('student-select').innerHTML = filtered.map(s=>`<option value="${db.students.indexOf(s)}">${s.name}</option>`).join(''); 
    }
    async function addPts() { 
        const i = document.getElementById('student-select').value; 
        const p = parseInt(fixNums(document.getElementById('pts').value) || 0); 
        if(i==="") return; 
        db.students[i].points += p; 
        await syncPush(); 
        alert('تم رصد النقاط!'); 
        render(); 
    }

    setInterval(syncPull, 5000);
    window.onload = () => { syncPull(); render(); };
  </script>
</body>
</html>
